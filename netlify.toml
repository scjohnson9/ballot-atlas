# Netlify configuration for The Ballot Atlas.
#
# The site is built with Astro's base: '/ballot-atlas' config, which
# prefixes every internal link with /ballot-atlas. In production, a
# Cloudflare worker (Phase 10) proxies thinkchristian.com/ballot-atlas/*
# to this Netlify deployment, stripping the prefix before forwarding.
# The rewrite rule below mimics that behavior on the bare .netlify.app
# URL itself, so the full UX (map click → pushState → state page →
# measure page → back) can be tested end-to-end on the Netlify
# staging URL before Cloudflare is in place.

[build]
  command = "npm run build"
  publish = "dist"

# Map requests for /ballot-atlas/* to the bare path in dist/.
# Status 200 makes this a silent rewrite (URL stays the same in the
# browser), not a 301 redirect. The Cloudflare worker behaves the
# same way in production.
[[redirects]]
  from = "/ballot-atlas/*"
  to = "/:splat"
  status = 200
